# Vector: receive click events over HTTP, batch, and write to Postgres.
sources:
  events_in:
    type: http_server
    address: 0.0.0.0:8080
    decoding:
      codec: json

transforms:
  enrich:
    type: remap
    inputs: [events_in]
    source: |
      .created_at = now()

sinks:
  postgres_out:
    type: postgres
    inputs: [enrich]
    endpoint: "postgres://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}"
    table: "analytics.page_clicks"
    batch:
      max_events: 500
      timeout_secs: 5
    buffer:
      type: disk           # queues events on disk if the DB is down (no data loss)
      max_size: 268435488  # 256 MB minimum
      when_full: block
