data_dir: /var/lib/vector

sources:
  events_in:
    type: http_server
    address: 0.0.0.0:8080
    decoding:
      codec: json

transforms:
  enrich:
    type: remap
    inputs: [events_in]
    source: |
      .created_at = now()

sinks:
  postgres_out:
    type: postgres
    inputs: [enrich]
    endpoint: "${VECTOR_DB_URL}"
    table: "analytics.page_clicks"
    batch:
      max_events: 500
      timeout_secs: 5
    buffer:
      type: disk
      max_size: 268435488
      when_full: block