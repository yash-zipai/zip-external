#################################################
# Global Settings
#################################################

data_dir: "C:/temp/vector-data"          # <-- CHANGED: Windows path (create this folder). /var/lib/vector is Linux-only.

#################################################
# Vector API
#################################################

api:
  enabled: true
  address: 0.0.0.0:8686

#################################################
# Sources
#################################################

sources:

  zipai_logs:
    type: file
    include:
      - "C:/temp/zipai.log"               # <-- CHANGED: forward slashes (backslashes break Vector's glob on Windows)
    read_from: beginning
    ignore_older_secs: 86400

    #include_containers:                   # (correctly commented out — that's a docker_logs field)
    #  - zipai-external-api

#################################################
# Transforms
#################################################

transforms:

  parse_json:
    type: remap
    inputs:
      - zipai_logs

    source: |

      if exists(.message) {
        parsed, err = parse_json(string!(.message))
        if err == null {
          . = object(parsed) ?? .
        }
      }

  enrich:
    type: remap
    inputs:
      - parse_json

    source: |

      .received_at = now()

      .service = "zipai-external-api"

      .environment = get_env_var("APP_ENV") ?? "production"

#################################################
# Filter
#################################################

  analytics_events:
    type: filter

    inputs:
      - enrich

    condition: exists(.event_type)

#################################################
# Sinks
#################################################

sinks:

  console:
    type: console

    inputs:
      - analytics_events

    encoding:
      codec: json

  analytics_api:
    type: http

    inputs:
      - analytics_events

    uri: http://localhost:8001/v1/internal/vector/events   # <-- CHANGED: localhost (not api:) + /v1 prefix

    method: post

    encoding:
      codec: json

    request:
      headers:
        Content-Type: application/json

    healthcheck:
      enabled: false      # <-- CHANGED: was true. Avoids a boot failure if the API isn't up yet / the POST-only route 405s.